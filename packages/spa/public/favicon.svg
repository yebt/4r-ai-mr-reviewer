<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%" role="img" aria-label="AI code review">
  <!-- Borderless technical-minimalist mark: near-black canvas tile, hairline
       divider border, acid-lime code brackets (primary) framing a flame verify
       tick (secondary). Flat geometry, no glow, legible at 16px. -->

  <!-- Dark canvas squircle with a hairline line-colored border -->
  <rect x="26" y="26" width="460" height="460" rx="104"
        fill="#0a0a0b" stroke="#2a2a30" stroke-width="4" />

  <!-- Left code bracket "<" — accent lime (primary mark color) -->
  <path d="M 182 156 L 116 256 L 182 356"
        fill="none" stroke="#d6ff3f" stroke-width="38"
        stroke-linecap="round" stroke-linejoin="round" />

  <!-- Right code bracket ">" — accent lime (primary mark color) -->
  <path d="M 330 156 L 396 256 L 330 356"
        fill="none" stroke="#d6ff3f" stroke-width="38"
        stroke-linecap="round" stroke-linejoin="round" />

  <!-- Center verify tick — flame (secondary accent) -->
  <path d="M 214 262 L 244 302 L 302 212"
        fill="none" stroke="#ff5a1f" stroke-width="38"
        stroke-linecap="round" stroke-linejoin="round" />
</svg>
